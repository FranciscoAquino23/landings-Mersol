<!-- ==========================================================================
     NAVBAR COMPONENT STRUCTURE
     ========================================================================== -->

<header class="header-wrapper" [class.scrolled]="isScrolled">
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-content">
      <div class="contact-info">
        <a href="https://wa.me/529939805654" target="_blank" class="contact-item">
          <div class="contact-icon-svg icon-phone"></div>
          <span>+52 993 980 5654</span>
        </a>
        <a href="mailto:ventas@mersolsureste.com.mx" class="contact-item">
          <div class="contact-icon-svg icon-mail"></div>
          <span>ventas@mersolsureste.com.mx</span>
        </a>
      </div>
      <div class="social-links-wrapper">
        <app-social-links></app-social-links>
      </div>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar" role="navigation" aria-label="Navegación Principal">
    <div class="navbar-content">
      <!-- MENU -->
      <button
        class="menu-toggle"
        (click)="toggleMenu()"
        [class.open]="isMenuOpen"
        aria-label="Menú de navegación"
      >
        <span></span><span></span><span></span>
      </button>

      <!-- LOGOS -->
      <div class="brand-group">
        <a
          href="#inicio"
          (click)="scrollToAnchor('inicio'); $event.preventDefault()"
          class="logo-link"
          title="Mersol Sureste"
        >
          <img
            src="assets/brand/shared/logos/MERSOL.svg"
            alt="Logo Mersol Sureste"
            class="logo-mersol"
          />
        </a>

        @if (brandLogo) {
          <div class="brand-divider" aria-hidden="true"></div>
          <a
            href="#inicio"
            (click)="scrollToAnchor('inicio'); $event.preventDefault()"
            class="logo-link"
            [title]="brandLogoAlt"
          >
            <img [src]="brandLogo" [alt]="brandLogoAlt" class="logo-partner-img" />
          </a>
        }
      </div>

      <!-- NAV LINKS -->
      <ul class="nav-links" [class.active]="isMenuOpen">
        <li>
          <a href="#inicio" (click)="scrollToAnchor('inicio'); $event.preventDefault()">Inicio</a>
        </li>
        <li>
          <a href="#productos" (click)="scrollToAnchor('productos'); $event.preventDefault()"
            >Productos</a
          >
        </li>
        <li>
          <a href="#nosotros" (click)="scrollToAnchor('nosotros'); $event.preventDefault()"
            >Nosotros</a
          >
        </li>
        <li>
          <a href="#testimonios" (click)="scrollToAnchor('testimonios'); $event.preventDefault()"
            >Opiniones</a
          >
        </li>
        <li>
          <a href="#faq" (click)="scrollToAnchor('faq'); $event.preventDefault()">Preguntas</a>
        </li>
        <li>
          <a href="#sucursales" (click)="scrollToAnchor('sucursales'); $event.preventDefault()"
            >Sucursales</a
          >
        </li>

        <li class="mobile-only-content">
          <div class="mobile-only-cta">
            <a
              href="#contacto"
              (click)="scrollToAnchor('contacto'); $event.preventDefault()"
              class="btn-primary"
            >
              Cotizar Ahora
            </a>
          </div>
          <!-- CONTACT -->
          <div class="mobile-contact-info">
            <div class="divider"></div>
            <p>CONTÁCTANOS</p>
            <a href="tel:529939805654" class="m-link">
              <div class="icon-circle"><span class="contact-icon-svg icon-phone"></span></div>
              <span>+52 993 980 5654</span>
            </a>
            <a href="mailto:ventas@mersolsureste.com.mx" class="m-link email-link">
              <div class="icon-circle"><span class="contact-icon-svg icon-mail"></span></div>
              <span>ventas@mersolsureste.com.mx</span>
            </a>
          </div>
        </li>
      </ul>

      <!-- CTA -->
      <div class="nav-cta-desktop">
        <a
          href="#contacto"
          (click)="scrollToAnchor('contacto'); $event.preventDefault()"
          class="btn-primary"
        >
          Cotizar Ahora
        </a>
      </div>
    </div>
  </nav>
</header>
