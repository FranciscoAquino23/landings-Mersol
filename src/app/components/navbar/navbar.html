<!-- ==========================================================================
     NAVEGATION BAR (HEADER)
     ======================================================================= -->

<header class="header-wrapper">
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="container top-bar-content">
      <div class="contact-info">
        <a href="tel:+525555571966" class="contact-item">
          <img src="assets/brand/socials/phone.svg" alt="Teléfono" class="contact-icon-svg" />
          <span>(55) 5557 1966</span>
        </a>
        <span class="contact-divider"></span>
        <a href="mailto:servicioaclientes@austromex.com.mx" class="contact-item">
          <img src="assets/brand/socials/mail.svg" alt="Correo" class="contact-icon-svg" />
          <span>servicioaclientes@austromex.com.mx</span>
        </a>
      </div>
      <app-social-links></app-social-links>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar" role="navigation" aria-label="Navegación principal">
    <div class="container navbar-content">
      <div class="brand-group">
        <a
          [routerLink]="['/']"
          fragment="inicio"
          class="logo-link"
          (click)="closeMenu()"
          title="Ir al inicio - Austromex"
        >
          <img
            src="assets/brand/AUSTROMEX.svg"
            alt="Distribuidor Autorizado Austromex"
            class="logo-partner-img"
          />
        </a>

        <div class="brand-divider"></div>

        <a
          [routerLink]="['/']"
          fragment="inicio"
          class="logo-link"
          (click)="closeMenu()"
          title="Mersol Sureste"
        >
          <img src="assets/brand/MERSOL.svg" alt="Mersol Sureste" class="logo-mersol" />
        </a>
      </div>

      <!-- MENU (MOBILE) -->
      <button
        class="menu-toggle"
        (click)="toggleMenu()"
        [class.open]="isMenuOpen"
        aria-label="Abrir menú de navegación"
        [attr.aria-expanded]="isMenuOpen"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <ul class="nav-links" [class.active]="isMenuOpen">
        <!-- CONTACT -->
        <li class="mobile-menu-contact">
          <div class="contact-buttons-container">
            <a href="tel:+525555571966" class="menu-contact-btn">
              <div class="icon-box">
                <img src="assets/brand/socials/phone.svg" alt="Icono Llamar" />
              </div>
              <span>Llamar</span>
            </a>
            <a href="mailto:servicioaclientes@austromex.com.mx" class="menu-contact-btn">
              <div class="icon-box">
                <img src="assets/brand/socials/mail.svg" alt="Icono Correo" />
              </div>
              <span>Correo</span>
            </a>
          </div>
        </li>

        <!-- LINKS & BUTTON -->
        <li><a [routerLink]="['/']" fragment="inicio" (click)="closeMenu()">Inicio</a></li>
        <li><a [routerLink]="['/']" fragment="nosotros" (click)="closeMenu()">Nosotros</a></li>
        <li><a [routerLink]="['/']" fragment="productos" (click)="closeMenu()">Productos</a></li>

        <li class="nav-cta">
          <a [routerLink]="['/']" fragment="contacto" class="btn btn-primary" (click)="closeMenu()">
            Cotizar Ahora
          </a>
        </li>
      </ul>
    </div>
  </nav>
</header>
