<!-- ==========================================================================
     CATEGORY COMPONENT STRUCTURE
     ========================================================================== -->

<div class="category-section-wrapper" (mouseenter)="onMouseEnter()" (mouseleave)="onMouseLeave()">
  <div id="nuestros-productos" class="carousel-section-header">
    <div class="section-header-col">
      <!-- HEADER -->
      <span class="overline">NUESTROS PRODUCTOS</span>

      <div class="title-with-l-shape">
        <h2 class="main-title">
          EXPLORA NUESTRO <br />
          CATÁLOGO
        </h2>
      </div>

      <p class="description-text">
        Descubre nuestra amplia variedad de insumos industriales de la más alta calidad.
      </p>
    </div>
  </div>

  <!-- CATEGORIES -->
  <div
    class="carousel-container"
    role="region"
    aria-roledescription="carousel"
    aria-label="Catálogo de categorías"
  >
    <!-- PREV BUTTON -->
    <button
      class="nav-btn prev"
      (click)="prev()"
      aria-label="Ver categorías anteriores"
      type="button"
    >
      <span class="arrow" aria-hidden="true">&lsaquo;</span>
    </button>

    <!-- CAROUSEL -->
    <div class="carousel-viewport">
      <div
        class="carousel-track"
        #carouselTrack
        (focusin)="stopAutoPlay()"
        (focusout)="startAutoPlay()"
      >
        @for (category of displayCategories(); track $index) {
          <div
            class="category-card"
            (click)="onCategoryClick(category)"
            (keydown.enter)="onCategoryClick(category)"
            role="link"
            tabindex="0"
            [attr.aria-label]="'Ver productos de ' + category.title"
          >
            <!-- CATEGORY CARD -->
            <div class="card-image-wrapper">
              <img
                [src]="category.image"
                [alt]="'Categoría ' + category.title"
                loading="lazy"
                class="category-img"
                width="300"
                height="350"
              />
            </div>

            <div class="card-footer">
              <h3 class="category-title">{{ category.title }}</h3>
              <div class="category-link" aria-hidden="true">
                VER PRODUCTOS
                <span class="icon-arrow">&rarr;</span>
              </div>
            </div>
          </div>
        }
      </div>
    </div>

    <!-- NEXT BUTTON -->
    <button
      class="nav-btn next"
      (click)="next()"
      aria-label="Ver siguientes categorías"
      type="button"
    >
      <span class="arrow" aria-hidden="true">&rsaquo;</span>
    </button>
  </div>
</div>
