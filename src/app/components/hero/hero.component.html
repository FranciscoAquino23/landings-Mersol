<!-- ==========================================================================
     HERO COMPONENT STRUCTURE
     ========================================================================== -->

<section class="hero-section" id="inicio" [class.is-active]="isVisible()">
  <!-- BANNER -->
  <div class="hero-bg-wrapper">
    <picture>
      <source media="(min-width: 1024px)" [srcset]="desktopImage" type="image/webp" />
      <img
        [ngSrc]="mobileImage"
        priority
        fetchpriority="high"
        fill
        [alt]="imageAlt"
        class="hero-image-optimized"
      />
    </picture>
    <div class="hero-overlay"></div>
  </div>

  <div class="container hero-container">
    <div class="hero-grid">
      <!-- HEADER -->
      <div class="hero-content">
        <div class="content-inner">
          <div class="brand-tag">
            <span class="line"></span>
            <span class="tag-text">MERSOL SURESTE</span>
          </div>
          <h1 class="hero-title" [innerHTML]="title"></h1>
          <p class="hero-subtitle">{{ subtitle }}</p>

          <!-- BUTTONS -->
          <div class="hero-actions">
            <!-- CATALOG -->
            <button
              (click)="onPrimaryAction()"
              class="btn-hero primary"
              type="button"
              aria-label="Descargar catálogo de productos PDF"
            >
              <span class="btn-text">{{ primaryCtaText }}</span>
            </button>

            <!-- WHATSAPP -->
            <button
              (click)="onSecondaryAction()"
              class="btn-hero secondary"
              type="button"
              aria-label="Contactar por WhatsApp"
            >
              <span class="btn-text">{{ secondaryCtaText }}</span>
            </button>
          </div>

          <!-- EXPERIENCE -->
          <div class="experience-ticker-integrated">
            <div class="ticker-content">
              <div class="stat-item">
                <span class="stat-number">{{ stats.value }}</span>
                <div class="stat-text">
                  <strong>{{ stats.label }}</strong>
                  <span>{{ stats.description }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="hero-visual-space"></div>
    </div>
  </div>
  <div class="bottom-red-divider"></div>
</section>
