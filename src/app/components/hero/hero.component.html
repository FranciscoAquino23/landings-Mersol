<!-- ==========================================================================
     HERO COMPONENT STRUCTURE
     ========================================================================== -->

<section class="hero-section" id="inicio" [class.is-active]="isVisible()">
  <!-- BANNER -->
  <div class="hero-bg-wrapper">
    <div class="hero-image" [style.backgroundImage]="heroBgStyle"></div>
    <div class="hero-overlay"></div>
  </div>

  <div class="container hero-container">
    <div class="hero-grid">
      <!-- HEADER -->
      <div class="hero-content">
        <div class="content-inner">
          <div class="brand-tag">
            <span class="line"></span>
            <span class="tag-text">MERSOL SURESTE</span>
          </div>
          <h1 class="hero-title" [innerHTML]="title"></h1>
          <p class="hero-subtitle">Expertos en soldadura y abrasivos para el sureste mexicano.</p>

          <!-- BUTTONS -->
          <div class="hero-actions">
            <!-- CATALOG -->
            <button
              (click)="onPrimaryAction()"
              class="btn-hero primary"
              type="button"
              aria-label="Descargar catálogo de productos PDF"
            >
              <span class="btn-text">DESCARGAR CATÁLOGO</span>
            </button>

            <!-- WHATSAPP -->
            <a
              href="https://wa.me/529939805654?text=Hola,%20vengo%20de%20su%20sitio%20web%20y%20solicito%20información%20sobre%20sus%20productos."
              target="_blank"
              class="btn-hero secondary"
              aria-label="Contactar por WhatsApp"
            >
              CONTACTO
            </a>
          </div>

          <!-- EXPERIENCE -->
          <div class="experience-ticker-integrated">
            <div class="ticker-content">
              <div class="stat-item">
                <span class="stat-number">{{ stats.value }}</span>
                <div class="stat-text">
                  <strong>{{ stats.label }}</strong>
                  <span>{{ stats.description }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="hero-visual-space"></div>
    </div>
  </div>
  <div class="bottom-red-divider"></div>
</section>
