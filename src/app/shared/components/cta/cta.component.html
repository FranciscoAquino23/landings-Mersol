<!-- ==========================================================================
     CTA (CALL TO ACTION) STRUCTURE
     ======================================================================= -->

<section
  class="cta-banner"
  [style.backgroundColor]="bannerBgColor"
  role="complementary"
  aria-label="Llamada a la acción: Solicitar asesoría"
>
  <div class="container">
    <div class="cta-wrapper">
      <!-- MESSAGE -->
      <div class="cta-content">
        <h2 class="cta-title" [innerHTML]="title"></h2>
      </div>

      <!-- BUTTON (WHATSAPP) -->
      <div class="cta-action">
        <a
          [href]="whatsappUrl"
          (click)="onContactClick($event)"
          target="_blank"
          rel="noopener noreferrer"
          class="cta-button"
          [style.color]="buttonTextColor"
          aria-label="Contactar por WhatsApp para solicitar asesoría"
        >
          <span class="cta-icon">
            <img [src]="whatsappIcon" alt="" aria-hidden="true" />
          </span>
          <span class="button-text">SOLICITAR ASESORÍA</span>
        </a>
      </div>
    </div>
  </div>
</section>
