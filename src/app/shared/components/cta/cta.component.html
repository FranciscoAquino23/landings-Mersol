<!-- ==========================================================================
     CTA (CALL TO ACTION) STRUCTURE
     ======================================================================= -->

<section
  class="cta-banner"
  role="complementary"
  aria-label="Llamada a la acción: Solicitar asesoría"
>
  <div class="container">
    <div class="cta-wrapper">
      <!-- MESSAGE -->
      <div class="cta-content">
        <h2 class="cta-title">
          ¿BUSCAS CALIDAD Y SEGURIDAD PARA LLEVAR TU PRODUCTIVIDAD AL SIGUIENTE NIVEL?
        </h2>
      </div>

      <!-- BUTTON (WHATSAPP) -->
      <div class="cta-action">
        <a
          [href]="whatsappUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="cta-button"
          aria-label="Contactar por WhatsApp para solicitar asesoría"
        >
          <span class="cta-icon">
            <img src="assets/brand/icons/redwhatsapp.svg" alt="" aria-hidden="true" />
          </span>

          <span class="button-text">SOLICITAR ASESORÍA</span>
        </a>
      </div>
    </div>
  </div>
</section>
