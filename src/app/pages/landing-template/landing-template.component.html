<!-- ==========================================================================
     LANDING TEMPLATE STRUCTURE
     ======================================================================= -->

<!-- STYLES -->
<div
  class="landing-page"
  [style.--primary]="config.colors.primary"
  [style.--primary-hover]="config.colors.primaryHover"
  [style.--secondary]="config.colors.secondary"
>
  <!-- HERO -->
  <header id="inicio" role="banner">
    <app-hero
      [title]="config.hero.title"
      [subtitle]="config.hero.subtitle"
      [desktopImage]="config.hero.desktopImage"
      [mobileImage]="config.hero.mobileImage"
      [primaryCtaText]="config.hero.primaryCtaText"
      [secondaryCtaText]="config.hero.secondaryCtaText"
      [catalogUrl]="config.hero.catalogUrl"
      [whatsappUrl]="config.hero.whatsappUrl"
      [stats]="config.hero.stats"
    />
  </header>

  <!-- MAIN CONTENT -->
  @defer (on viewport; on idle) {
    <main>
      <!-- PRODUCTS -->
      <section id="productos" class="section-padding" aria-label="Nuestros Productos">
        <div class="container">
          <app-category-carousel />
        </div>
      </section>

      <!-- BANNER -->
      <section class="promo-wrapper" aria-label="Promociones destacadas">
        <div class="container">
          <app-banner />
        </div>
      </section>

      <!-- INFO + FEATURES -->
      @defer (on viewport) {
        <section id="nosotros" class="section-padding" aria-labelledby="nosotros-title">
          <app-info />
        </section>

        <section id="beneficios" class="section-padding" aria-label="Nuestros Beneficios">
          <app-features />
        </section>
      } @placeholder {
        <div style="min-height: 400px"></div>
      }

      <!-- TESTIMONIALS -->
      @defer (on viewport; on timer(1s)) {
        <section id="testimonios" class="section-padding" aria-label="Testimonios de Clientes">
          <app-testimonials />
        </section>

        <!-- FAQ -->
        <section id="faq" class="section-padding" aria-label="Preguntas Frecuentes">
          <app-faq />
        </section>

        <!-- LOCATIONS -->
        <section id="sucursales" class="section-padding" aria-label="Nuestras Sucursales">
          <app-locations />
        </section>

        <!-- CONTACT FORM -->
        <section id="contacto" class="section-padding" aria-label="Formulario de Contacto">
          <app-contact-form />
        </section>

        <!-- CTA -->
        <app-cta />
      } @placeholder {
        <div style="min-height: 500px"></div>
      }
    </main>
  } @placeholder {
    <div style="min-height: 50vh"></div>
  }
</div>
